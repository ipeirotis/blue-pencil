name: tag-release

# Create annotated release tags from a session that cannot push tags itself.
# Dispatch with space-separated tag=sha pairs; existing tags are skipped.

on:
  workflow_dispatch:
    inputs:
      pairs:
        description: "Space-separated tag=sha pairs, e.g. v1.28.0=688b697"
        required: true
        type: string

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create annotated tags
        id: tags
        env:
          PAIRS: ${{ inputs.pairs }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          versions=""
          for pair in $PAIRS; do
            tag="${pair%%=*}"
            sha="${pair#*=}"
            if git rev-parse -q --verify "refs/tags/$tag" >/dev/null; then
              echo "skip: $tag already exists"
              continue
            fi
            git tag -a "$tag" -m "$tag" "$sha"
            git push origin "$tag"
            echo "created: $tag -> $sha"
            versions="$versions ${tag#v}"
          done
          echo "versions=$(echo $versions | xargs)" >> "$GITHUB_OUTPUT"

      # Tags pushed above use GITHUB_TOKEN, so they do not trigger the
      # release.yml `push: tags` workflow. Publish their Releases here so an
      # action-created tag is never left without a matching GitHub Release.
      - name: Publish GitHub Release(s) for the new tags
        if: steps.tags.outputs.versions != ''
        env:
          GH_TOKEN: ${{ github.token }}
          VERSIONS: ${{ steps.tags.outputs.versions }}
        run: |
          set -euo pipefail
          bash scripts/publish-releases.sh $VERSIONS
